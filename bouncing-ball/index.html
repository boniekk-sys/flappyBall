<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bouncing Ball Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <header class="hud">
      <h1 class="title">Bouncing Ball</h1>
      <div class="score-panel">
        <span class="label">Score</span>
        <span id="score" class="score-value">0</span>
      </div>
    </header>

    <div class="arena-container" id="gameArea">
      <canvas id="arena" width="480" height="320" aria-label="Bouncing ball runner"></canvas>

      <div id="startOverlay" class="overlay">
        <p class="overlay-title">Bouncing Ball</p>
        <p class="overlay-hint">Jump over obstacles as you run forward</p>
        <p class="overlay-controls"><kbd>SPACE</kbd> or tap to jump</p>
        <button id="startBtn" class="btn btn-primary" type="button">Start Run</button>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <p class="overlay-title game-over-text">GAME OVER</p>
        <p class="final-score">Score: <span id="finalScore">0</span></p>
        <button id="restartBtn" class="btn btn-primary" type="button">Try Again</button>
      </div>
    </div>

    <footer class="hint">
      <kbd>SPACE</kbd> Jump · Avoid obstacles · Don't fall
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
